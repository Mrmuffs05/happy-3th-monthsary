<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Love letter for crush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="love letter 2.css" />
  </head>
  <body>
    <!-- tiktok meowish -->
    <div class="envlope-wrapper">
      <img
        class="floating-photo photo-left"
        src="images/bunny-photo.jpg"
        alt="" />
      <img
        class="hands-art"
        src="images/hands-line-art.jpg"
        alt="" />
      <img
        class="floating-photo photo-right"
        src="images/fox-photo.jpg"
        alt="" />
      <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        <div class="letter">
          <div class="words line1">သို့/ကလေးလေးရတီစီ</div>
          <div class="words line2">ကို့ဘ၀ထဲကလေးလေးရောက်လာတဲ့၃လတွင်းမှာပဲများရီးပြောင်းလဲခဲ့ပါတယ်တစ််သက်လုံးစာမရခဲ့တဲ့နွေးထွေးမှုတွေကလေးလေးနဲ့မှသိလာရပါတယ်</div>
          <div class="words line3">ကိုတိုင်လည်းနွေးထွေးမှုတွေပြရမှာမရှက်တော့ဘူး</div>
          <div class="words line4">ကလေးလေးကိုအမြဲချစ်နေမယ်အဲ့တာကကတိဆိုတာထက်အမှန်တရားပါပဲ</div>
        </div>
        <div class="hearts">
          <div class="heart a1"></div>
          <div class="heart a2"></div>
          <div class="heart a3"></div>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="love letter 2.js"></script>
  </body>
</html>
